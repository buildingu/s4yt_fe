name: Deploy Production Client

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Create Environment File
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env

      - name: Build Frontend
        run: npm run build

      - name: Setup SSH
        env:
          PRIVATE_KEY: ${{ secrets.DIGITAL_OCEAN_PRIVATE_KEY }}
        run: |
          echo "${PRIVATE_KEY}" | sed 's/\r$//' > private_key
          chmod 600 private_key

      - name: Ensure Target Directory Exists
        env:
          HOST: ${{ secrets.DIGITAL_OCEAN_IP }}
          USER: ${{ secrets.DIGITAL_OCEAN_USER }}
          PORT: ${{ secrets.PORT }}
        run: |
          ssh -i private_key -p $PORT -o StrictHostKeyChecking=no $USER@$HOST "
            mkdir -p /var/www/s4yt/s4yt_fe/build
          "

      - name: Deploy Build Files
        env:
          HOST: ${{ secrets.DIGITAL_OCEAN_IP }}
          USER: ${{ secrets.DIGITAL_OCEAN_USER }}
          PORT: ${{ secrets.PORT }}
        run: |
          rsync -avz --delete \
            -e "ssh -i private_key -p $PORT -o StrictHostKeyChecking=no" \
            build/ \
            $USER@$HOST:/var/www/s4yt/s4yt_fe/build/

      - name: Restart Nginx
        env:
          HOST: ${{ secrets.DIGITAL_OCEAN_IP }}
          USER: ${{ secrets.DIGITAL_OCEAN_USER }}
          PORT: ${{ secrets.PORT }}
        run: |
          ssh -i private_key -p $PORT -o StrictHostKeyChecking=no $USER@$HOST << 'EOF'
            sudo systemctl restart nginx
          EOF